<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تسجيل الدخول — ذاكرة غزة</title>
  <link rel="stylesheet" href="../assets/css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet" />
</head>
<body class="auth-page">

    <!-- زر العودة للرئيسية -->
  <a href="../index.html" class="auth-back-link">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    العودة للرئيسية
  </a>
  
  <div class="auth-container">

  <!-- الشعار -->
    <div class="auth-logo">
      <span class="auth-logo__symbol">☽</span>
      <span class="auth-logo__title">ذاكرة غزة</span>
    </div>

    <div id="loginError" class="auth-alert auth-alert--error" style="display:none"></div>

    <h1 class="auth-title">أهلاً بعودتك</h1>
    <p class="auth-sub">سجّل دخولك لتشارك قصتك وتدير قصصك السابقة.</p>

    <div class="form-group">
      <label class="form-label">البريد الإلكتروني</label>
      <input type="email" id="loginEmail" class="form-input" placeholder="example@mail.com" dir="ltr" />
    </div>
    <div class="form-group">
      <label class="form-label">كلمة المرور</label>
      <input type="password" id="loginPassword" class="form-input" placeholder="••••••••" dir="ltr" />
    </div>

    <button class="btn btn--submit" id="loginBtn" onclick="handleLogin()">
      <span class="btn__text">دخول</span>
      <span class="btn__loader" style="display:none">جارٍ التحقق...</span>
    </button>

    <p class="auth-switch">ما عندك حساب؟ <a href="register.html">أنشئ حساباً جديداً</a></p>

    <div class="auth-guest-sep"><span>أو</span></div>
    <a href="../index.html" class="btn btn--ghost btn--full auth-guest-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      متابعة كزائر (قراءة فقط)
    </a>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="../assets/js/firebase-config.js"></script>
  <script src="../assets/js/login.js"></script>
</body>
</html>
